name: OptiScaler Bot

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정 (UTC 기준)
  workflow_dispatch: # Actions 탭에서 수동으로 테스트 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # json 파일 저장을 위한 쓰기 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests discord-webhook beautifulsoup4 deep-translator

      - name: 봇 스크립트 실행
        env:
          DISCORD_WEBHOOK_OPTISCALER: ${{ secrets.DISCORD_WEBHOOK_OPTISCALER }}
        run: python optiscaler_bot.py

      - name: 기록 파일 (JSON) 변경사항 커밋 및 푸시
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # 파일이 있으면 추가하고, 없으면 에러 없이 무시
          git add optiscaler_games.json || echo "No file to add"
          # 변경된 내용이 있을 때만 커밋하고 푸시 (에러 128 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update games data" && git push)